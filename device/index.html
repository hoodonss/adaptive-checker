<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --border: #e5e5ea;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent-huawei: #cf0a2c;
    --accent-samsung: #1428a0;
    --accent-xiaomi: #ff6700;
    --accent-oppo: #1ba784;
    --accent-vivo: #415fff;
    --accent-honor: #00a0e9;
    --accent-motorola: #5c2d91;
    --accent-apple: #555555;
    --accent-google: #4285f4;
    --accent-lenovo: #e2231a;
    --accent-other: #86868b;
    --tag-bg: #f0f0f5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.5;
  }

  /* Header */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 28px 0 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner { max-width: 1448px; margin: 0 auto; padding: 0 24px; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 2px;
  }
  .header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  /* Main category tabs */
  .cat-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .cat-tab {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
    white-space: nowrap;
  }
  .cat-tab:hover { color: var(--text-primary); }
  .cat-tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--text-primary);
    font-weight: 600;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--tag-bg);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .stat-chip strong {
    color: var(--text-primary);
    font-weight: 600;
    font-size: 15px;
  }

  /* Sub filter tabs (for foldable) */
  .filter-bar {
    max-width: 1448px;
    margin: 12px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 13px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: #1d1d1f; color: var(--text-primary); }
  .filter-btn.active {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
  }

  /* Search bar (v1.6) */
  .search-bar {
    max-width: 1448px;
    margin: 12px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }
  .search-group label {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .search-input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 13px;
    color: var(--text-primary);
    font-family: inherit;
  }
  .search-input.kw { width: 180px; }
  .search-input.size { width: 56px; font-variant-numeric: tabular-nums; }
  .search-input::placeholder { color: var(--text-tertiary); }
  .search-sep { color: var(--text-tertiary); font-size: 12px; }
  .search-clear {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
    font-family: inherit;
  }
  .search-clear:hover { border-color: #1d1d1f; color: var(--text-primary); }
  .search-result-count {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .search-result-count strong { color: var(--text-primary); font-weight: 600; }
  .no-result {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
  }
  @media (max-width: 768px) {
    .search-bar { padding: 0 12px; gap: 8px; }
    .search-input.kw { width: 130px; }
  }

  /* Main content */
  .main { max-width: 1448px; margin: 16px auto; padding: 0 24px 40px; }

  /* Insight section */
  .insight-section {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .insight-section h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .insight-section h2 .insight-icon {
    font-size: 16px;
  }
  .insight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }
  .insight-card {
    background: #fafafa;
    border-radius: 8px;
    padding: 16px;
    border: 1px solid #f0f0f0;
  }
  .insight-card h3 {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .insight-card .insight-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .tag-size-xs { background: #e8f5e9; color: #2e7d32; }
  .tag-size-s { background: #e3f2fd; color: #1565c0; }
  .tag-size-m { background: #fff3e0; color: #e65100; }
  .tag-size-l { background: #fce4ec; color: #c62828; }
  .tag-size-xl { background: #f3e5f5; color: #6a1b9a; }
  .tag-size-xxl { background: #efebe9; color: #4e342e; }
  .insight-card p {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .insight-card .size-range {
    display: inline-block;
    padding: 2px 6px;
    background: #f0f0f5;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-primary);
    margin: 2px 2px;
  }
  .insight-summary {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #f0f0f0;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.8;
  }
  .insight-summary strong {
    color: var(--text-primary);
  }

  /* Brand section */
  .brand-section {
    margin-bottom: 20px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .brand-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .brand-name {
    font-size: 15px;
    font-weight: 600;
  }
  .brand-count {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-left: auto;
  }
  .brand-arrow {
    font-size: 11px;
    color: var(--text-tertiary);
    transition: transform 0.2s;
  }
  .brand-section.collapsed .brand-arrow { transform: rotate(-90deg); }
  .brand-section.collapsed .brand-body { display: none; }

  /* Table */
  .brand-body { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1480px;
  }
  thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #fafafa;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody td {
    padding: 10px 12px;
    vertical-align: middle;
    white-space: nowrap;
  }
  td.device-cell { white-space: normal; min-width: 200px; }
  .device-name {
    font-weight: 600;
    color: var(--text-primary);
    display: block;
    line-height: 1.3;
  }
  .type-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .type-h { background: #e8f0fe; color: #1a73e8; }
  .type-v { background: #fce8e6; color: #d93025; }
  .type-t { background: #e6f4ea; color: #137333; }
  .type-w { background: #fef3e0; color: #e37400; }

  .num { font-variant-numeric: tabular-nums; }
  .weight-light { color: #137333; font-weight: 600; }
  .weight-heavy { color: #d93025; }

  /* Trend chart area */
  .trend-section {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
  }
  .trend-section h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .trend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }
  .trend-card {
    background: #fafafa;
    border-radius: 8px;
    padding: 16px;
  }
  .trend-card h3 {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bar-label {
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 50px;
    text-align: right;
  }
  .bar-track {
    flex: 1;
    height: 18px;
    background: #e8e8ed;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding-left: 6px;
    font-size: 10px;
    color: #fff;
    font-weight: 500;
    white-space: nowrap;
    min-width: fit-content;
    transition: width 0.6s ease;
  }
  .bar-value {
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 50px;
    font-weight: 500;
  }

  /* Footer note */
  .footnote {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 16px 20px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-top: 20px;
  }
  .footnote strong { color: var(--text-primary); }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 20px 0 0; }
    .header-inner { padding: 0 12px; }
    .main { padding: 0 12px 32px; }
    .filter-bar { padding: 0 12px; }
    .stats-bar { gap: 6px; }
    .stat-chip { padding: 4px 8px; font-size: 11px; }
    .cat-tab { padding: 8px 14px; font-size: 13px; }
    .insight-grid { grid-template-columns: 1fr; }
  }
  .src-tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:500; }
  .src-est { background:#fff8e1; color:#a06800; }
  .src-measured { background:#e6f4ea; color:#137333; }
  .src-missing { background:#f0f0f5; color:#aeaeb2; }
  .src-todo { background:#fdecea; color:#c0392b; }
</style>
</head>

  } else if (cat === "tablet") {
    if (w < 500) return "weight-light";
    if (w > 650) return "weight-heavy";
  } else {
    if (w < 200) return "weight-light";
    if (w > 270) return "weight-heavy";
  }
  return "";
}

function getBrandsForData(data) {
  const keys = [...new Set(data.map(d => d.brand))];
  return ALL_BRANDS.filter(b => keys.includes(b.key));
}

function renderStats() {
  let data, brands, catLabel;
  if (currentCat === "phone") {
    data = PHONES; catLabel = "手机";
  } else if (currentCat === "tablet") {
    data = TABLETS; catLabel = "平板";
  } else {
    data = FOLDABLES; catLabel = "折叠屏";
  }

  const total = data.length;
  const brandCount = [...new Set(data.map(d => d.brand))].length;
  const years = [...new Set(data.map(d => d.year))];
  const minYear = Math.min(...years);
  const maxYear = Math.max(...years);

  let chips = `<div class="stat-chip">共 <strong>${total}</strong> 款${catLabel}</div>`;
  chips += `<div class="stat-chip"><strong>${brandCount}</strong> 个品牌</div>`;
  chips += `<div class="stat-chip">时间跨度 <strong>${minYear}-${maxYear}</strong></div>`;

  if (currentCat === "foldable") {
    const hAll = data.filter(d => d.type === "h");
    const hCompact = hAll.filter(d => d.screen <= 7.6).length;
    const hStandard = hAll.filter(d => d.screen >= 7.7 && d.screen < 8.0).length;
    const hLarge = hAll.filter(d => d.screen >= 8.0).length;
    const v = data.filter(d => d.type === "v").length;
    const t = data.filter(d => d.type === "t").length;
    const w = data.filter(d => d.type === "w").length;
    chips += `<div class="stat-chip">横折叠 <strong>${hAll.length}</strong>（紧凑 ${hCompact} / 标准 ${hStandard} / 大屏 ${hLarge}）</div>`;
    chips += `<div class="stat-chip">竖折叠 <strong>${v}</strong></div>`;
    chips += `<div class="stat-chip">三折叠 <strong>${t}</strong></div>`;
    chips += `<div class="stat-chip">阔折叠 <strong>${w}</strong></div>`;
  }

  document.getElementById("statsBar").innerHTML = chips;
}

function renderFilterBar() {
  const area = document.getElementById("filterArea");
  let html = "";

  // Foldable type pills (kept as-is, stacked above search)
  if (currentCat === "foldable") {
    const filters = [
      { key:"all", label:"\u5168\u90e8" },
      { key:"h", label:"\u6a2a\u6298\u53e0 (\u4e66\u672c\u5f0f)" },
      { key:"h-compact", label:"\u2515 \u7d27\u51d1 \u22647.6\"" },
      { key:"h-standard", label:"\u2515 \u6807\u51c6 7.7\"\u20137.95\"" },
      { key:"h-large", label:"\u2515 \u5927\u5c4f \u22658.0\"" },
      { key:"v", label:"\u7ad6\u6298\u53e0 (\u7ffb\u76d6\u5f0f)" },
      { key:"t", label:"\u4e09\u6298\u53e0" },
      { key:"w", label:"\u9614\u6298\u53e0" },
    ];
    html += `<div class="filter-bar">${filters.map(f =>
      `<button class="filter-btn${currentFilter===f.key?" active":""}" data-filter="${f.key}">${f.label}</button>`
    ).join("")}</div>`;
  }

  // Search bar (all tabs)
  html += `<div class="search-bar">
    <div class="search-group">
      <label>\u{1F50D} \u5173\u952e\u8bcd</label>
      <input type="text" id="kwInput" class="search-input kw" placeholder="\u8bbe\u5907\u540d / \u54c1\u724c\uff0c\u5982 iPhone\u3001\u534e\u4e3a\u3001Ultra" value="${searchKw.replace(/"/g,'&quot;')}">
    </div>
    <div class="search-group">
      <label>\u5c4f\u5e55\u5c3a\u5bf8(\u5bf8)</label>
      <input type="number" id="minInput" class="search-input size" placeholder="\u6700\u5c0f" step="0.1" value="${minSize!=null?minSize:''}">
      <span class="search-sep">\u2013</span>
      <input type="number" id="maxInput" class="search-input size" placeholder="\u6700\u5927" step="0.1" value="${maxSize!=null?maxSize:''}">
    </div>
    <div class="search-group">
      <label>${currentCat==="foldable"?"\u5c55\u5f00\u5bbd(mm)":"\u673a\u8eab\u5bbd(mm)"}</label>
      <input type="number" id="minWInput" class="search-input size" placeholder="\u6700\u5c0f" step="0.1" value="${minW!=null?minW:''}">
      <span class="search-sep">\u2013</span>
      <input type="number" id="maxWInput" class="search-input size" placeholder="\u6700\u5927" step="0.1" value="${maxW!=null?maxW:''}">
    </div>
    <div class="search-group">
      <label>${currentCat==="foldable"?"\u5c55\u5f00\u9ad8(mm)":"\u673a\u8eab\u9ad8(mm)"}</label>
      <input type="number" id="minHInput" class="search-input size" placeholder="\u6700\u5c0f" step="0.1" value="${minH!=null?minH:''}">
      <span class="search-sep">\u2013</span>
      <input type="number" id="maxHInput" class="search-input size" placeholder="\u6700\u5927" step="0.1" value="${maxH!=null?maxH:''}">
    </div>
    <button class="search-clear" id="clearBtn">\u6e05\u9664\u7b5b\u9009</button>
    <span class="search-result-count" id="resultCount"></span>
  </div>`;

  area.innerHTML = html;

  // bind foldable pills
  area.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      area.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderContent();
    });
  });

  // bind search inputs (live)
  const kwEl = document.getElementById("kwInput");
  const minEl = document.getElementById("minInput");
  const maxEl = document.getElementById("maxInput");
  if (kwEl) kwEl.addEventListener("input", () => { searchKw = kwEl.value; renderContent(); restoreFocus("kwInput", kwEl.value.length); });
  if (minEl) minEl.addEventListener("input", () => { minSize = minEl.value===""?null:parseFloat(minEl.value); renderContent(); restoreFocus("minInput"); });
  if (maxEl) maxEl.addEventListener("input", () => { maxSize = maxEl.value===""?null:parseFloat(maxEl.value); renderContent(); restoreFocus("maxInput"); });
  const minWEl = document.getElementById("minWInput");
  const maxWEl = document.getElementById("maxWInput");
  const minHEl = document.getElementById("minHInput");
  const maxHEl = document.getElementById("maxHInput");
  if (minWEl) minWEl.addEventListener("input", () => { minW = minWEl.value===""?null:parseFloat(minWEl.value); renderContent(); restoreFocus("minWInput"); });
  if (maxWEl) maxWEl.addEventListener("input", () => { maxW = maxWEl.value===""?null:parseFloat(maxWEl.value); renderContent(); restoreFocus("maxWInput"); });
  if (minHEl) minHEl.addEventListener("input", () => { minH = minHEl.value===""?null:parseFloat(minHEl.value); renderContent(); restoreFocus("minHInput"); });
  if (maxHEl) maxHEl.addEventListener("input", () => { maxH = maxHEl.value===""?null:parseFloat(maxHEl.value); renderContent(); restoreFocus("maxHInput"); });
  const clearEl = document.getElementById("clearBtn");
  if (clearEl) clearEl.addEventListener("click", () => { searchKw=""; minSize=null; maxSize=null; minW=null; maxW=null; minH=null; maxH=null; renderFilterBar(); renderContent(); });
}

// keep caret/focus in the active input after re-render
function restoreFocus(id, caret) {
  const el = document.getElementById(id);
  if (!el) return;
  el.focus();
  if (caret != null && el.setSelectionRange) {
    try { el.setSelectionRange(caret, caret); } catch(e) {}
  }
}

// apply keyword + size-range filter on a dataset
function applySearch(data) {
  let out = data;
  const kw = searchKw.trim().toLowerCase();
  if (kw) {
    out = out.filter(d => {
      const info = ALL_BRANDS.find(b => b.key === d.brand);
      const brandName = info ? info.name.toLowerCase() : d.brand;
      return d.name.toLowerCase().includes(kw) || brandName.includes(kw) || d.brand.toLowerCase().includes(kw);
    });
  }
  if (minSize != null && !isNaN(minSize)) out = out.filter(d => d.screen >= minSize);
  if (maxSize != null && !isNaN(maxSize)) out = out.filter(d => d.screen <= maxSize);
  if (minW != null && !isNaN(minW)) out = out.filter(d => d.w != null && d.w >= minW);
  if (maxW != null && !isNaN(maxW)) out = out.filter(d => d.w != null && d.w <= maxW);
  if (minH != null && !isNaN(minH)) out = out.filter(d => d.h != null && d.h >= minH);
  if (maxH != null && !isNaN(maxH)) out = out.filter(d => d.h != null && d.h <= maxH);
  return out;
}

function filterFoldables(filterKey) {
  if (filterKey === "all") return FOLDABLES;
  if (filterKey === "h-compact") return FOLDABLES.filter(d => d.type === "h" && d.screen <= 7.6);
  if (filterKey === "h-standard") return FOLDABLES.filter(d => d.type === "h" && d.screen >= 7.7 && d.screen < 8.0);
  if (filterKey === "h-large") return FOLDABLES.filter(d => d.type === "h" && d.screen >= 8.0);
  return FOLDABLES.filter(d => d.type === filterKey);
}

function renderContent() {
  let data;
  if (currentCat === "phone") data = PHONES;
  else if (currentCat === "tablet") data = TABLETS;
  else {
    data = filterFoldables(currentFilter);
  }

  // v1.6: apply keyword + size-range search
  const hasSearch = (searchKw.trim() !== "") || (minSize != null) || (maxSize != null) || (minW != null) || (maxW != null) || (minH != null) || (maxH != null);
  data = applySearch(data);

  // live result count
  const rc = document.getElementById("resultCount");
  if (rc) rc.innerHTML = hasSearch ? `\u7b5b\u9009\u51fa <strong>${data.length}</strong> \u6b3e` : "";

  const brands = getBrandsForData(data);
  const grouped = {};
  brands.forEach(b => { grouped[b.key] = []; });
  data.forEach(d => { if (grouped[d.brand]) grouped[d.brand].push(d); });

  const container = document.getElementById("mainContent");
  let html = "";

  // Insight section
  html += renderInsight();

  // Trend section for foldable "all" view (hidden while searching)
  if (currentCat === "foldable" && currentFilter === "all" && !hasSearch) {
    html += renderFoldableTrend(data);
  }

  // Brand tables
  brands.forEach(brand => {
    const devices = grouped[brand.key];
    if (!devices || devices.length === 0) return;
    devices.sort((a, b) => a.screen - b.screen || a.year - b.year);

    html += `<div class="brand-section" data-brand="${brand.key}">`;
    html += `<div class="brand-header" onclick="toggleBrand(this)">
      <span class="brand-dot" style="background:${brand.color}"></span>
      <span class="brand-name">${brand.name}</span>
      <span class="brand-count">${devices.length} 款</span>
      <span class="brand-arrow">\u25BC</span>
    </div>`;
    html += `<div class="brand-body"><table>`;
    html += `<thead><tr>
      <th>\u8BBE\u5907</th>
      <th>\u5E74\u4EFD</th>
      ${currentCat==="foldable"?"<th>\u7C7B\u578B</th>":""}
      <th>${currentCat==="foldable"?"\u5185\u5C4F\u5C3A\u5BF8":"\u5C4F\u5E55\u5C3A\u5BF8"}</th>
      <th>\u5206\u8FA8\u7387</th>
      <th>PPI</th>
      <th>${currentCat==="foldable"?"\u5C55\u5F00\u5BBD (mm)":"\u673A\u8EAB\u5BBD (mm)"}</th>
      <th>${currentCat==="foldable"?"\u5C55\u5F00\u9AD8 (mm)":"\u673A\u8EAB\u9AD8 (mm)"}</th>
      <th>\u4E0A\u8FB9\u6846 (mm)</th>
      <th>\u4E0B\u8FB9\u6846 (mm)</th>
      <th>\u5DE6\u8FB9\u6846 (mm)</th>
      <th>\u53F3\u8FB9\u6846 (mm)</th>
      <th>\u91CD\u91CF (g)</th>
      <th>\u6765\u6E90</th>
    </tr></thead><tbody>`;

    devices.forEach(d => {
      html += `<tr>`;
      html += `<td class="device-cell"><span class="device-name">${d.name}</span></td>`;
      html += `<td class="num">${d.year}</td>`;
      if (currentCat === "foldable") {
        html += `<td><span class="type-tag ${TYPE_CLASS[d.type]}">${TYPE_MAP[d.type]}</span></td>`;
      }
      html += `<td class="num">${d.screen}"</td>`;
      html += `<td class="num">${d.res}</td>`;
      html += `<td class="num">${fmt(d.ppi)}</td>`;
      html += `<td class="num">${fmt(d.w)}</td>`;
      html += `<td class="num">${fmt(d.h)}</td>`;
      html += `<td class="num">${fmt(d.bt)}</td>`;
      html += `<td class="num">${fmt(d.bb)}</td>`;
      html += `<td class="num">${fmt(d.bl)}</td>`;
      html += `<td class="num">${fmt(d.br)}</td>`;
      html += `<td class="num ${weightClass(d.weight, currentCat)}">${fmt(d.weight)}</td>`;
      html += `<td>${d.bezel_src?('<span class="src-tag src-'+d.bezel_src+'">'+SRC_MAP[d.bezel_src]+'</span>'):'\u2014'}</td>`;
      html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
  });

  // v1.6: no-result message
  if (data.length === 0) {
    html += `<div class="no-result">\u6ca1\u6709\u7b26\u5408\u6761\u4ef6\u7684\u8bbe\u5907\uff0c\u8bf7\u8c03\u6574\u5173\u952e\u8bcd\u6216\u5c3a\u5bf8\u8303\u56f4\u3002</div>`;
  }

  // Footnote
  let note = '<strong>\u8BF4\u660E\uFF1A</strong>';
  if (currentCat === "phone") {
    note += '<br>\u2022 \u673A\u8EAB\u5BBD/\u9AD8\u6307\u8BBE\u5907\u672A\u6298\u53E0\u72B6\u6001\u4E0B\u7684\u7269\u7406\u5C3A\u5BF8\uFF08\u6BEB\u7C73\uFF09';
    note += '<br>\u2022 \u6BCF\u4E2A\u54C1\u724C\u9009\u53D6\u4EE3\u8868\u6027\u65D7\u8230/\u4E3B\u529B\u673A\u578B\uFF0C\u4E0D\u5305\u542B\u4E2D\u7AEF\u673A';
    note += '<br>\u2022 \u6570\u636E\u6765\u6E90\uFF1A\u5404\u54C1\u724C\u5B98\u7F51\u3001GSMArena\u7B49\uFF0C\u5982\u6709\u9057\u6F0F\u6216\u52D8\u8BEF\u6B22\u8FCE\u6307\u6B63';
  } else if (currentCat === "tablet") {
    note += '<br>\u2022 \u673A\u8EAB\u5BBD/\u9AD8\u6307\u5E73\u677F\u672A\u5C55\u5F00/\u672A\u914D\u4EF6\u952E\u76D8\u72B6\u6001\u4E0B\u7684\u7269\u7406\u5C3A\u5BF8\uFF08\u6BEB\u7C73\uFF09';
    note += '<br>\u2022 \u6BCF\u4E2A\u54C1\u724C\u9009\u53D6\u4EE3\u8868\u6027\u5E73\u677F\u4EA7\u54C1\u7EBF';
    note += '<br>\u2022 \u6570\u636E\u6765\u6E90\uFF1A\u5404\u54C1\u724C\u5B98\u7F51\u3001GSMArena\u3001Apple\u5B98\u65B9\u6280\u672F\u89C4\u683C\u9875\u7B49';
  } else {
    note += '<br>\u2022 \u5C55\u5F00\u5BBD/\u9AD8\u6307\u5C4F\u5E55\u5C55\u5F00\u72B6\u6001\u4E0B\u673A\u8EAB\u7684\u7269\u7406\u5C3A\u5BF8\uFF0C\u90E8\u5206\u578B\u53F7\u5B98\u65B9\u672A\u516C\u5E03';
    note += '<br>\u2022 PPI \u6570\u636E\u6765\u81EA\u5B98\u65B9\u53C2\u6570\u9875\u6216\u7B2C\u4E09\u65B9\u6D4B\u91CF\uFF0C\u90E8\u5206\u65E9\u671F\u578B\u53F7\u672A\u516C\u5E03';
    note += '<br>\u2022 \u4E09\u6298\u53E0\u6307\u5C4F\u5E55\u4E09\u6298\u5C55\u5F00\u5F62\u6001\uFF1B\u9614\u6298\u53E0\uFF08\u534E\u4E3A Pura X \u7CFB\u5217\uFF09\u6307\u72EC\u7279\u5BBD\u5C4F\u6BD4\u4F8B\u6298\u53E0\u5F62\u6001';
    note += '<br>\u2022 \u6570\u636E\u6765\u6E90\uFF1A\u5404\u54C1\u724C\u5B98\u7F51\u3001GSMArena\u3001Wikipedia\u3001\u767E\u5EA6\u767E\u79D1\u7B49';
  }

  note += '<br><br><strong>边框（黑边）数据说明：</strong>';
  note += '<br>• 上/下/左/右边框指屏幕可视区域边缘到机身物理边缘的距离（mm），折叠屏取内屏';
  note += '<br>• <span class="src-tag src-est">估算</span> 无真实实测参数的设备，按以下公式计算：<strong>长边黑边（上=下）=（设备长边 − 屏幕长边）/2</strong>；<strong>短边黑边（左=右）=（设备短边 − 屏幕短边）/2</strong>。其中屏幕长/短边 = 分辨率长/短边 ÷ PPI × 25.4';
  note += '<br>• 由公式可知上下取同值、左右取同值（未区分额头与下巴），属均分近似，误差约 ±0.3–0.8mm';
  note += '<br>• <span class="src-tag src-missing">缺失</span> 表示原始分辨率/PPI/机身尺寸口径不一致、反推出现负值或明显失真，故留空';
  note += '<br>• 原始机身宽/高为含边框的整机尺寸，故边框为“含机身中框”的视觉黑边近似值，仅供 UI 适配参考';
  note += '<br>• <span class="src-tag src-todo">待补</span> 表示该设备已发布/即将发布但官方尚未公布完整参数，已先列入，参数待后续补录';
  html += `<div class="footnote">${note}</div>`;
  container.innerHTML = html;
}

function renderFoldableTrend(devices) {
  const hDevices = devices.filter(d => d.type === "h" && d.weight).sort((a, b) => a.year - b.year);
  const vDevices = devices.filter(d => d.type === "v" && d.weight).sort((a, b) => a.year - b.year);

  let html = `<div class="trend-section"><h2>\u8D8B\u52BF\u6D1E\u5BDF</h2><div class="trend-grid">`;

  const brandColors = {};
  ALL_BRANDS.forEach(b => { brandColors[b.key] = b.color; });

  // 横折叠 — 各年最轻代表
  const hByYear = {};
  hDevices.forEach(d => { if (!hByYear[d.year] || d.weight < hByYear[d.year].weight) hByYear[d.year] = d; });

  html += `<div class="trend-card"><h3>\u6A2A\u6298\u53E0 \u2014 \u5404\u5E74\u6700\u8F7B\u4EE3\u8868</h3><div class="bar-chart">`;
  Object.entries(hByYear).sort((a,b) => Number(a[0]) - Number(b[0])).forEach(([year, d]) => {
    const pct = Math.min(100, (d.weight / 320) * 100);
    const color = brandColors[d.brand] || "var(--accent-other)";
    html += `<div class="bar-row"><span class="bar-label">${year}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${d.name.split(" ")[0]}</div></div><span class="bar-value">${d.weight}g</span></div>`;
  });
  html += `</div></div>`;

  // 横折叠 — 各年最大内屏
  const screenByYear = {};
  hDevices.forEach(d => { if (!screenByYear[d.year] || d.screen > screenByYear[d.year].screen) screenByYear[d.year] = d; });

  html += `<div class="trend-card"><h3>\u6A2A\u6298\u53E0 \u2014 \u5404\u5E74\u6700\u5927\u5185\u5C4F\u5C3A\u5BF8</h3><div class="bar-chart">`;
  Object.entries(screenByYear).sort((a,b) => Number(a[0]) - Number(b[0])).forEach(([year, d]) => {
    const pct = (d.screen / 10.5) * 100;
    const color = brandColors[d.brand] || "var(--accent-other)";
    html += `<div class="bar-row"><span class="bar-label">${year}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${d.screen}"</div></div><span class="bar-value">${d.screen}"</span></div>`;
  });
  html += `</div></div>`;

  // 品牌设备数量
  const brandCount = {};
  devices.forEach(d => { brandCount[d.brand] = (brandCount[d.brand] || 0) + 1; });
  const maxCount = Math.max(...Object.values(brandCount));

  html += `<div class="trend-card"><h3>\u54C1\u724C\u8BBE\u5907\u6570\u91CF</h3><div class="bar-chart">`;
  Object.entries(brandCount).sort((a,b) => b[1] - a[1]).forEach(([brand, count]) => {
    const pct = (count / maxCount) * 100;
    const info = ALL_BRANDS.find(b => b.key === brand);
    const color = info ? info.color : "var(--accent-other)";
    const name = info ? info.name.split(" ")[0] : brand;
    html += `<div class="bar-row"><span class="bar-label">${name}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${count} \u6B3E</div></div><span class="bar-value">${count}</span></div>`;
  });
  html += `</div></div>`;

  // 竖折叠 — 各年最轻代表
  const vByYear = {};
  vDevices.forEach(d => { if (!vByYear[d.year] || d.weight < vByYear[d.year].weight) vByYear[d.year] = d; });

  html += `<div class="trend-card"><h3>\u7AD6\u6298\u53E0 \u2014 \u5404\u5E74\u6700\u8F7B\u4EE3\u8868</h3><div class="bar-chart">`;
  Object.entries(vByYear).sort((a,b) => Number(a[0]) - Number(b[0])).forEach(([year, d]) => {
    const pct = Math.min(100, (d.weight / 210) * 100);
    const color = brandColors[d.brand] || "var(--accent-other)";
    html += `<div class="bar-row"><span class="bar-label">${year}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${d.name.split(" ")[0]}</div></div><span class="bar-value">${d.weight}g</span></div>`;
  });
  html += `</div></div>`;

  html += `</div></div>`;
  return html;
}

function toggleBrand(el) {
  el.closest(".brand-section").classList.toggle("collapsed");
}

// ==================== CATEGORY TAB LOGIC ====================

document.querySelectorAll(".cat-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentCat = tab.dataset.cat;
    currentFilter = "all";
    searchKw = ""; minSize = null; maxSize = null; minW = null; maxW = null; minH = null; maxH = null;
    renderStats();
    renderFilterBar();
    renderContent();
  });
});

// ==================== INIT ====================
renderStats();
renderFilterBar();
renderContent();
